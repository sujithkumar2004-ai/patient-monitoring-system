services:
  - type: web
    name: patient-monitor-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    autoDeploy: true
    healthCheckPath: /
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: patient-monitor-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://patient-monitoring-system.vercel.app
      - key: SEED_ON_STARTUP
        value: "true"

databases:
  - name: patient-monitor-db
    plan: free
    databaseName: patient_monitor
    user: patient_monitor_user
