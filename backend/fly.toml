app = "pulseward-monitor-api"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  FRONTEND_URL = "http://localhost:3000"
  SEED_ON_STARTUP = "true"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
